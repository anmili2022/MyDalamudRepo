name: Sync Pluginmaster

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: sync-pluginmaster
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync pluginmaster.json
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git fetch origin $env:BRANCH
          git reset --hard "origin/$env:BRANCH"
          ./scripts/sync-pluginmaster.ps1

      - name: Commit changes
        shell: bash
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- pluginmaster.json; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "chore: sync pluginmaster"
          git fetch origin "$BRANCH"
          git rebase "origin/$BRANCH"
          git push origin HEAD:"$BRANCH"
